```yaml id="u4v8qn"
name: Build SRC Extensions

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-all-extensions:

    name: Build All Extensions

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # Checkout Repository
      # ==========================================
      - name: Checkout Code
        uses: actions/checkout@v4


      # ==========================================
      # Setup Java
      # ==========================================
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'


      # ==========================================
      # Install Rush CLI
      # ==========================================
      - name: Install Rush CLI
        run: |

          curl https://raw.githubusercontent.com/shreyashsaitwal/rush-cli/main/scripts/install/install.sh -fsSL | sh

          echo "$HOME/.rush/bin" >> $GITHUB_PATH


      # ==========================================
      # Detect + Build ALL Extensions
      # ==========================================
      - name: Build All Rush Extensions
        run: |

          echo ""
          echo "===================================="
          echo "Searching for Rush Extensions..."
          echo "===================================="

          EXT_FOUND=false

          find . -name "rush.yml" | while read file; do

            EXT_DIR=$(dirname "$file")

            echo ""
            echo "===================================="
            echo "Extension Found:"
            echo "$EXT_DIR"
            echo "===================================="

            EXT_FOUND=true

            cd "$EXT_DIR"

            echo ""
            echo "Building Extension..."
            echo ""

            rush build --release -r

            echo ""
            echo "Build Finished:"
            echo "$EXT_DIR"

            cd - > /dev/null

          done

          if [ "$EXT_FOUND" = false ]; then
            echo ""
            echo "No Rush Extensions Found!"
            exit 1
          fi


      # ==========================================
      # Show Generated AIX Files
      # ==========================================
      - name: Show Generated Files
        run: |

          echo ""
          echo "===================================="
          echo "Generated AIX Files"
          echo "===================================="

          find . -name "*.aix"


      # ==========================================
      # Upload ALL AIX Files
      # ==========================================
      - name: Upload AIX Files
        uses: actions/upload-artifact@v4
        with:
          name: SRC-Extensions-Build

          path: |
            */out/**/*.aix
            */build/**/*.aix
            */dist/**/*.aix

          retention-days: 90
```
